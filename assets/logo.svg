<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Combined smooth gradient for the map continents -->
    <linearGradient id="logo-map-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ca3df" />
      <stop offset="42%" stop-color="#2dd4bf" />
      <stop offset="70%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#a3e635" />
    </linearGradient>

    <!-- Rich blue gradient for the cradling wings -->
    <linearGradient id="logo-wings-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#40c2f3" />
      <stop offset="50%" stop-color="#0881ce" />
      <stop offset="100%" stop-color="#0e49ac" />
    </linearGradient>

    <!-- Lime/Gold gradient for the tilted planetary axis ring -->
    <linearGradient id="logo-axis-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#84cc16" />
    </linearGradient>
  </defs>

  <!-- 1. The Globe Structure (United Nations Aztec-style polar grid) -->
  <circle cx="100" cy="72" r="38" fill="#ffffff" stroke="#b0b9c3" stroke-width="0.8" />
  <circle cx="100" cy="72" r="13" fill="none" stroke="#cbd3da" stroke-width="0.7" />
  <circle cx="100" cy="72" r="25" fill="none" stroke="#cbd3da" stroke-width="0.7" />
  
  <!-- Meridians / Speakers -->
  <line x1="100" y1="34" x2="100" y2="110" stroke="#cbd3da" stroke-width="0.7" />
  <line x1="62" y1="72" x2="138" y2="72" stroke="#cbd3da" stroke-width="0.7" />
  <line x1="73.1" y1="45.1" x2="126.9" y2="98.9" stroke="#cbd3da" stroke-width="0.7" />
  <line x1="73.1" y1="98.9" x2="126.9" y2="45.1" stroke="#cbd3da" stroke-width="0.7" />

  <!-- 2. Continents overlays (with horizontal map-grad gradient) -->
  <path d="M 85,43 C 83,42 81,44 82,47 C 84,49 87,48 88,46 Z" fill="url(#logo-map-grad)" />
  <path d="M 78,48 C 76,46 72,48 70,52 C 65,51 63,56 64,62 C 65,66 70,68 70,72 C 70,76 66,79 66,82 C 66,86 71,90 74,94 C 77,98 81,99 83,96 C 85,93 81,89 82,85 C 83,81 87,79 86,75 C 85,70 82,66 82,61 C 82,57 80,51 78,48 Z" fill="url(#logo-map-grad)" />
  <path d="M 104,49 C 109,47 115,44 121,48 C 126,51 130,55 128,60 C 126,64 120,63 121,68 C 122,72 126,72 125,76 C 123,79 118,78 116,76 C 114,74 115,69 112,67 C 110,65 106,68 103,66 C 101,64 101,51 104,49 Z" fill="url(#logo-map-grad)" />
  <path d="M 104,70 C 108,68 112,70 114,73 C 117,77 120,78 118,83 C 115,89 114,93 110,96 C 108,98 106,95 106,92 C 106,88 108,85 106,82 C 104,79 102,78 101,76 C 100,74 101,71 104,70 Z" fill="url(#logo-map-grad)" />
  <path d="M 126,83 C 124,82 122,84 123,87 C 125,89 128,88 128,85 Z" fill="url(#logo-map-grad)" />

  <!-- 3. Tilted planetary axis / Globe stand semicircular ring -->
  <path d="M 68.9,40.9 A 44,44 0 0 0 131.1,103.1" fill="none" stroke="url(#logo-axis-grad)" stroke-width="3.2" stroke-linecap="round" />
  
  <!-- Support pins connecting globe to stand -->
  <line x1="73.1" y1="45.1" x2="68.9" y2="40.9" stroke="#0660c1" stroke-width="2.5" stroke-linecap="round" />
  <line x1="126.9" y1="98.9" x2="131.1" y2="103.1" stroke="#0660c1" stroke-width="2.5" stroke-linecap="round" />

  <!-- 4. The Cradling Wings -->
  <path d="M 45,46 C 41,74 55,103 100,126 C 145,103 159,74 155,46 C 151,55 143,84 118,103 C 110,109 100,111 100,111 C 100,111 90,109 82,103 C 57,84 49,55 45,46 Z" fill="url(#logo-wings-grad)" />

  <!-- 5. Wordmark - Logo Typography with Times New Roman for a classic, high-end serif look -->
  <text x="100" y="161" font-family="'Times New Roman', Times, 'Playfair Display', serif" font-size="20" font-weight="700" fill="#0f172a" text-anchor="middle" letter-spacing="4.5">CONNECT</text>
  <text x="100" y="180" font-family="'Times New Roman', Times, 'Playfair Display', serif" font-size="11.5" font-weight="400" fill="#475569" text-anchor="middle" letter-spacing="7.5">VENTURES</text>
</svg>
